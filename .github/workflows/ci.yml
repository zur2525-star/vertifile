name: Vertifile CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality-gates:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: vertifile_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/vertifile_test
      HMAC_SECRET: test-secret-for-ci-do-not-use-in-production
      ADMIN_SECRET: test-admin-secret-for-ci

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      # 1. Clean install
      - name: Install dependencies
        run: npm ci

      # 2. Security audit — fail on high/critical
      - name: Security audit
        run: npm audit --audit-level=high

      # 3. Syntax validation (no eslint config in project — validate JS parses cleanly)
      - name: Syntax check
        run: |
          echo "Checking JS syntax..."
          fail=0
          for f in $(find . -name '*.js' -not -path './node_modules/*' -not -path './.git/*'); do
            if ! node --check "$f" 2>/dev/null; then
              echo "FAIL: $f"
              fail=1
            fi
          done
          if [ "$fail" -eq 1 ]; then
            echo "::error::Syntax errors found in JS files"
            exit 1
          fi
          echo "All JS files pass syntax check"

      # 4. No console.log in production server code
      # Scope: routes/, middleware/, services/, workers/, db.js, server.js, obfuscate.js, blockchain.js
      # Excluded (legitimate console usage):
      #   - tests/        — test output
      #   - contracts/    — blockchain deploy CLI scripts
      #   - sdk.js        — client-facing SDK uses console intentionally
      #   - templates/    — browser-embedded JS inside generated PVF files
      #   - viewer/       — desktop Electron viewer build scripts
      #   - scripts/      — one-off admin / migration scripts
      #   - public/       — static frontend JS (if any)
      - name: Check for console.log in production server code
        run: |
          echo "Scanning for console.log in production server code..."
          HITS=$(grep -rn 'console\.\(log\|debug\|info\|warn\|error\)' \
            --include='*.js' \
            --exclude-dir=node_modules \
            --exclude-dir=tests \
            --exclude-dir=test \
            --exclude-dir=.git \
            --exclude-dir=contracts \
            --exclude-dir=templates \
            --exclude-dir=viewer \
            --exclude-dir=scripts \
            --exclude-dir=public \
            --exclude='sdk.js' \
            . 2>/dev/null || true)
          if [ -n "$HITS" ]; then
            echo "$HITS"
            echo ""
            echo "::error::console.log statements found in production server code. Use the pino logger instead."
            exit 1
          fi
          echo "Clean — no console.log in production server code"

      # 5. Check for hardcoded secrets patterns
      - name: Check for hardcoded secrets
        run: |
          echo "Scanning for hardcoded secret patterns..."
          PATTERNS='(sk_live_|sk_test_|AKIA[0-9A-Z]{16}|password\s*[:=]\s*["\x27][^"\x27]{6,}|api[_-]?key\s*[:=]\s*["\x27][^"\x27]{6,}|secret\s*[:=]\s*["\x27][^"\x27]{6,})'
          HITS=$(grep -rEn "$PATTERNS" \
            --include='*.js' \
            --include='*.json' \
            --exclude-dir=node_modules \
            --exclude-dir=.git \
            --exclude='package-lock.json' \
            --exclude='*.test.js' \
            . 2>/dev/null || true)
          # Filter out env variable references (process.env.X) and common false positives
          REAL_HITS=$(echo "$HITS" | grep -v 'process\.env\.' | grep -v 'node_modules' | grep -v '\.example' || true)
          if [ -n "$REAL_HITS" ]; then
            echo "$REAL_HITS"
            echo ""
            echo "::error::Possible hardcoded secrets detected. Use environment variables instead."
            exit 1
          fi
          echo "Clean — no hardcoded secrets detected"

      # 6. Run tests — HARD GATE. Failing tests block the build.
      - name: Run tests
        run: npm test

      # 7. Validate JSON locale files
      - name: Validate JSON files
        run: |
          if [ -d "public/locales" ]; then
            echo "Validating locale JSON files..."
            fail=0
            for f in public/locales/*.json; do
              if ! node -e "JSON.parse(require('fs').readFileSync('$f','utf8'))" 2>/dev/null; then
                echo "FAIL: $f is not valid JSON"
                fail=1
              fi
            done
            if [ "$fail" -eq 1 ]; then
              echo "::error::Invalid JSON locale files found"
              exit 1
            fi
            echo "All locale files are valid JSON"
          else
            echo "No locales directory — skipping"
          fi

  # Notify on push to main only (Render auto-deploys from main)
  deploy-notify:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: quality-gates
    runs-on: ubuntu-latest
    steps:
      - name: Deployment notice
        run: |
          echo "## Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Deployed to **Render** via auto-deploy from \`main\` branch." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "By: @${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
