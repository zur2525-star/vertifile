<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — Vertifile</title>
  <meta name="description" content="Set a new password for your Vertifile account.">
  <link rel="icon" type="image/png" href="/images/logo-icon.png?v=3">
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Heebo:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/common.css">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{font-family:'Inter','Heebo',sans-serif;color:#374151;background:#f4f3f8;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center}
    [dir="rtl"] body{font-family:'Heebo','Inter',sans-serif}

    .reset-container{width:100%;max-width:440px;padding:20px}
    .logo-wrap{text-align:center;margin-bottom:32px}
    .logo-wrap img{height:32px}
    .card{background:#fff;border-radius:20px;padding:40px 36px;box-shadow:0 4px 24px rgba(0,0,0,.06);border:1px solid rgba(124,58,237,.08)}
    .card h1{font-size:24px;font-weight:800;color:#1e1b4b;margin-bottom:8px;text-align:center;letter-spacing:-.5px}
    .card p.sub{font-size:14px;color:#6b7280;text-align:center;margin-bottom:28px;line-height:1.6}
    .form-group{margin-bottom:20px}
    .form-group label{display:block;font-size:12px;font-weight:600;color:#374151;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
    .form-group input{width:100%;padding:14px 16px;border:1px solid rgba(124,58,237,.15);border-radius:12px;font-size:14px;font-family:inherit;color:#1e1b4b;background:#faf9ff;outline:none;transition:.3s}
    .form-group input:focus{border-color:#7c3aed;box-shadow:0 0 0 3px rgba(124,58,237,.1)}
    .form-group input.error{border-color:#ef4444}
    .password-rules{font-size:12px;color:#9ca3af;line-height:1.6;margin-top:6px}
    .submit-btn{width:100%;padding:14px;background:linear-gradient(135deg,#4f46e5,#7c3aed);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:.3s;box-shadow:0 4px 24px rgba(79,70,229,.3)}
    .submit-btn:hover{transform:translateY(-1px);box-shadow:0 8px 36px rgba(79,70,229,.5)}
    .submit-btn:disabled{opacity:.6;cursor:not-allowed;transform:none;box-shadow:none}
    .msg{padding:12px 16px;border-radius:10px;font-size:13px;margin-bottom:20px;display:none;line-height:1.5}
    .msg.error{display:block;background:rgba(239,68,68,.08);color:#dc2626;border:1px solid rgba(239,68,68,.15)}
    .msg.success{display:block;background:rgba(52,211,153,.08);color:#059669;border:1px solid rgba(52,211,153,.15)}
    .back-link{display:block;text-align:center;margin-top:20px;font-size:13px;color:#7c3aed;font-weight:500}
    .back-link:hover{color:#4f46e5}

    /* Success state */
    .success-view{display:none;text-align:center;padding:20px 0}
    .success-view .check-circle{width:64px;height:64px;border-radius:50%;background:rgba(52,211,153,.1);border:2px solid rgba(52,211,153,.3);display:flex;align-items:center;justify-content:center;margin:0 auto 20px}
    .success-view .check-circle svg{width:32px;height:32px;color:#34d399}
    .success-view h2{font-size:20px;font-weight:800;color:#1e1b4b;margin-bottom:10px}
    .success-view p{font-size:14px;color:#6b7280;line-height:1.6;margin-bottom:24px}
    .success-view .login-btn{display:inline-block;padding:12px 32px;background:linear-gradient(135deg,#4f46e5,#7c3aed);color:#fff;border-radius:12px;font-weight:700;font-size:14px;text-decoration:none;transition:.3s}
    .success-view .login-btn:hover{transform:translateY(-1px);box-shadow:0 8px 36px rgba(79,70,229,.5)}
  </style>
  <script src="/js/csrf.js"></script>
</head>
<body>

<div class="reset-container">
  <div class="logo-wrap">
    <a href="/"><img src="/images/logo-horizontal.png?v=3" alt="Vertifile" height="32"></a>
  </div>

  <div class="card">
    <!-- Form View -->
    <div id="formView">
      <h1 data-i18n="resetPassword.title">Set New Password</h1>
      <p class="sub" data-i18n="resetPassword.subtitle">Enter your new password below.</p>

      <div id="msgBox" class="msg"></div>

      <form id="resetForm" autocomplete="off">
        <div class="form-group">
          <label for="password" data-i18n="resetPassword.newPassword">New Password</label>
          <input type="password" id="password" name="password" required minlength="8" maxlength="128" placeholder="Enter new password" autocomplete="new-password">
          <div class="password-rules" data-i18n="resetPassword.rules">At least 8 characters, one uppercase, one lowercase, one digit, one special character.</div>
        </div>
        <div class="form-group">
          <label for="confirmPassword" data-i18n="resetPassword.confirmPassword">Confirm Password</label>
          <input type="password" id="confirmPassword" name="confirmPassword" required minlength="8" maxlength="128" placeholder="Confirm new password" autocomplete="new-password">
        </div>
        <button type="submit" class="submit-btn" id="submitBtn" data-i18n="resetPassword.submit">Reset Password</button>
      </form>

      <a href="/app" class="back-link" data-i18n="resetPassword.backToLogin">Back to Sign In</a>
    </div>

    <!-- Success View -->
    <div id="successView" class="success-view">
      <div class="check-circle">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <h2 data-i18n="resetPassword.successTitle">Password Updated</h2>
      <p data-i18n="resetPassword.successDesc">Your password has been reset successfully. You can now sign in with your new password.</p>
      <a href="/app" class="login-btn" data-i18n="resetPassword.signIn">Sign In</a>
    </div>
  </div>
</div>

<script src="/js/i18n.js"></script>
<script>
(function(){
  var params = new URLSearchParams(window.location.search);
  var token = params.get('token');
  var email = params.get('email');
  var form = document.getElementById('resetForm');
  var msgBox = document.getElementById('msgBox');
  var submitBtn = document.getElementById('submitBtn');
  var formView = document.getElementById('formView');
  var successView = document.getElementById('successView');

  function showMsg(text, type) {
    msgBox.textContent = text;
    msgBox.className = 'msg ' + type;
  }

  if (!token) {
    showMsg('Invalid or missing reset link. Please request a new password reset.', 'error');
    submitBtn.disabled = true;
  }

  form.addEventListener('submit', function(e) {
    e.preventDefault();
    msgBox.className = 'msg';
    msgBox.style.display = 'none';

    var pw = document.getElementById('password').value;
    var cpw = document.getElementById('confirmPassword').value;

    if (pw !== cpw) {
      showMsg('Passwords do not match.', 'error');
      return;
    }
    if (pw.length < 8) {
      showMsg('Password must be at least 8 characters.', 'error');
      return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = 'Resetting...';

    fetch('/auth/reset-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token: token, password: pw })
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.success) {
        formView.style.display = 'none';
        successView.style.display = 'block';
      } else {
        showMsg(data.error || 'Something went wrong. Please try again.', 'error');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Reset Password';
      }
    })
    .catch(function() {
      showMsg('Network error. Please check your connection and try again.', 'error');
      submitBtn.disabled = false;
      submitBtn.textContent = 'Reset Password';
    });
  });
})();
</script>
</body>
</html>
