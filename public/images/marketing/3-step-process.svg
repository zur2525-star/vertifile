<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280" width="800" height="280">
  <defs>
    <linearGradient id="circle1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="circle2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="circle3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <filter id="circShadow1">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#6366f1" flood-opacity="0.3"/>
    </filter>
    <filter id="circShadow2">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#7c3aed" flood-opacity="0.3"/>
    </filter>
    <filter id="circShadow3">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#10b981" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Connecting line -->
  <line x1="215" y1="112" x2="585" y2="112" stroke="#a78bfa" stroke-width="2.5"/>

  <!-- Arrow 1: between step 1 and step 2 -->
  <g transform="translate(310, 102)">
    <rect x="0" y="0" width="40" height="20" rx="10" fill="#7c3aed"/>
    <polygon points="28,10 20,5 20,15" fill="#ffffff"/>
  </g>

  <!-- Arrow 2: between step 2 and step 3 -->
  <g transform="translate(500, 102)">
    <rect x="0" y="0" width="40" height="20" rx="10" fill="#7c3aed"/>
    <polygon points="28,10 20,5 20,15" fill="#ffffff"/>
  </g>

  <!-- STEP 1: Upload -->
  <g transform="translate(130, 50)">
    <!-- Outer glow ring -->
    <circle cx="55" cy="62" r="56" fill="none" stroke="#6366f1" stroke-width="1.5" opacity="0.5"/>
    <!-- Main circle -->
    <circle cx="55" cy="62" r="46" fill="url(#circle1)" filter="url(#circShadow1)"/>
    <!-- Upload icon -->
    <g transform="translate(55, 62)" stroke="#ffffff" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M-14 6H-8a2 2 0 0 0 2-2V-8a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v12a2 2 0 0 0 2 2h6"/>
      <polyline points="-8,-8 0,-16 8,-8"/>
      <line x1="0" y1="-16" x2="0" y2="4"/>
    </g>
    <!-- Number badge -->
    <circle cx="84" cy="30" r="14" fill="#4c1d95" stroke="#6366f1" stroke-width="2"/>
    <text x="84" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#ffffff" font-weight="800">1</text>
  </g>
  <!-- Label -->
  <text x="185" y="185" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#4c1d95" font-weight="700">Upload</text>
  <text x="185" y="204" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11.5" fill="#6d28d9">Drop any document.</text>
  <text x="185" y="218" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11.5" fill="#6d28d9">We never read your content.</text>

  <!-- STEP 2: Protect -->
  <g transform="translate(345, 50)">
    <circle cx="55" cy="62" r="56" fill="none" stroke="#a855f7" stroke-width="1.5" opacity="0.5"/>
    <circle cx="55" cy="62" r="46" fill="url(#circle2)" filter="url(#circShadow2)"/>
    <!-- Shield icon -->
    <g transform="translate(55, 56)" stroke="#ffffff" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M0-18l16 8v10c0 10-6.5 17.5-16 20C-6.5 17.5-16 10-16 0v-10L0-18z"/>
      <path d="M-5 2l4 4 8-8"/>
    </g>
    <!-- Number badge -->
    <circle cx="84" cy="30" r="14" fill="#4c1d95" stroke="#a855f7" stroke-width="2"/>
    <text x="84" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#ffffff" font-weight="800">2</text>
  </g>
  <!-- Label -->
  <text x="400" y="185" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#4c1d95" font-weight="700">Protect</text>
  <text x="400" y="204" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11.5" fill="#6d28d9">7 layers of security</text>
  <text x="400" y="218" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11.5" fill="#6d28d9">seal your document.</text>

  <!-- STEP 3: Verify -->
  <g transform="translate(560, 50)">
    <circle cx="55" cy="62" r="56" fill="none" stroke="#34d399" stroke-width="1.5" opacity="0.5"/>
    <circle cx="55" cy="62" r="46" fill="url(#circle3)" filter="url(#circShadow3)"/>
    <!-- Checkmark circle icon -->
    <g transform="translate(55, 62)" stroke="#ffffff" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="0" cy="0" r="16" opacity="0.4"/>
      <path d="M-6 0l4 4 8-8"/>
    </g>
    <!-- Number badge -->
    <circle cx="84" cy="30" r="14" fill="#065f46" stroke="#34d399" stroke-width="2"/>
    <text x="84" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#ffffff" font-weight="800">3</text>
  </g>
  <!-- Label -->
  <text x="615" y="185" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#4c1d95" font-weight="700">Verify</text>
  <text x="615" y="204" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11.5" fill="#6d28d9">Anyone can check authenticity</text>
  <text x="615" y="218" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11.5" fill="#6d28d9">instantly. Anywhere.</text>

  <!-- Bottom accent line -->
  <rect x="340" y="254" width="120" height="3" rx="1.5" fill="#7c3aed"/>
</svg>