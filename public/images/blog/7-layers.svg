<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ede9fe"/>
      <stop offset="100%" stop-color="#ddd6fe"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <line x1="60" y1="0" x2="60" y2="60" stroke="#a78bfa" stroke-width="0.3" opacity="0.2"/>
      <line x1="0" y1="60" x2="60" y2="60" stroke="#a78bfa" stroke-width="0.3" opacity="0.2"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="600" cy="315" r="250" fill="url(#glow)"/>
  <!-- 7 concentric rings -->
  <circle cx="600" cy="315" r="60" fill="none" stroke="#c4b5fd" stroke-width="1.5" opacity="0.8"/>
  <circle cx="600" cy="315" r="95" fill="none" stroke="#a78bfa" stroke-width="1.5" opacity="0.7"/>
  <circle cx="600" cy="315" r="130" fill="none" stroke="#8b5cf6" stroke-width="1.5" opacity="0.6"/>
  <circle cx="600" cy="315" r="165" fill="none" stroke="#7c3aed" stroke-width="1.5" opacity="0.5"/>
  <circle cx="600" cy="315" r="200" fill="none" stroke="#6d28d9" stroke-width="1" opacity="0.4"/>
  <circle cx="600" cy="315" r="235" fill="none" stroke="#5b21b6" stroke-width="1" opacity="0.3"/>
  <circle cx="600" cy="315" r="270" fill="none" stroke="#4c1d95" stroke-width="1" opacity="0.2"/>
  <!-- Dots on rings for detail -->
  <circle cx="660" cy="315" r="3" fill="#c4b5fd" opacity="0.9"/>
  <circle cx="600" cy="220" r="3" fill="#a78bfa" opacity="0.8"/>
  <circle cx="505" cy="360" r="2.5" fill="#8b5cf6" opacity="0.7"/>
  <circle cx="730" cy="245" r="2.5" fill="#7c3aed" opacity="0.6"/>
  <circle cx="440" cy="250" r="2" fill="#6d28d9" opacity="0.5"/>
  <circle cx="785" cy="400" r="2" fill="#5b21b6" opacity="0.4"/>
  <circle cx="370" cy="400" r="2" fill="#4c1d95" opacity="0.3"/>
  <!-- Center shield glow -->
  <circle cx="600" cy="315" r="30" fill="#7c3aed" opacity="0.2"/>
  <circle cx="600" cy="315" r="20" fill="#a78bfa" opacity="0.3"/>
  <!-- Small shield shape at center -->
  <path d="M600 295 L618 303 L618 325 L600 335 L582 325 L582 303 Z" fill="none" stroke="#c4b5fd" stroke-width="1.5" opacity="0.6"/>
  <!-- Accent floating dots -->
  <circle cx="200" cy="120" r="2" fill="#a78bfa" opacity="0.4"/>
  <circle cx="980" cy="510" r="2.5" fill="#c4b5fd" opacity="0.3"/>
  <circle cx="150" cy="480" r="1.5" fill="#7c3aed" opacity="0.35"/>
  <circle cx="1050" cy="150" r="2" fill="#8b5cf6" opacity="0.3"/>
  <circle cx="300" cy="550" r="1.5" fill="#a78bfa" opacity="0.25"/>
  <circle cx="900" cy="80" r="2" fill="#c4b5fd" opacity="0.3"/>
  <!-- Subtle connecting lines -->
  <line x1="200" y1="120" x2="370" y2="250" stroke="#7c3aed" stroke-width="0.4" opacity="0.3"/>
  <line x1="785" y1="400" x2="980" y2="510" stroke="#7c3aed" stroke-width="0.4" opacity="0.25"/>
  <!-- Grid pattern overlay -->
  <rect width="1200" height="630" fill="url(#grid)"/>
</svg>
