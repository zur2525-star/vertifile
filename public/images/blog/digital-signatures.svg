<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg-digsig" x1="0" y1="0.2" x2="1" y2="0.8">
      <stop offset="0%" stop-color="#ede9fe"/>
      <stop offset="50%" stop-color="#ddd6fe"/>
      <stop offset="100%" stop-color="#f5f3ff"/>
    </linearGradient>
    <radialGradient id="glow-digsig" cx="50%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#dc2626" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots-digsig" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="0.6" fill="#a78bfa" opacity="0.2"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg-digsig)"/>
  <circle cx="600" cy="300" r="230" fill="url(#glow-digsig)"/>
  <!-- Broken signature line -->
  <g transform="translate(600,315)">
    <!-- Flowing signature path -->
    <path d="M-200 20 C-160 20,-140-30,-100-30 S-40 40,0 0 S60-50,100-20 S160 30,200 20" fill="none" stroke="#7c3aed" stroke-width="2" opacity="0.6" stroke-linecap="round"/>
    <!-- Break in signature (gap) -->
    <rect x="-15" y="-40" width="30" height="80" fill="url(#bg-digsig)"/>
    <!-- X marks at the break -->
    <line x1="-12" y1="-12" x2="12" y2="12" stroke="#dc2626" stroke-width="2" opacity="0.7" stroke-linecap="round"/>
    <line x1="12" y1="-12" x2="-12" y2="12" stroke="#dc2626" stroke-width="2" opacity="0.7" stroke-linecap="round"/>
    <!-- Red glow around break -->
    <circle r="25" fill="#dc2626" opacity="0.1"/>
  </g>
  <!-- Broken pen icon above -->
  <g transform="translate(600,220)" opacity="0.6">
    <!-- Pen top half -->
    <line x1="-25" y1="15" x2="-5" y2="-15" stroke="#c4b5fd" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Pen bottom half (offset = broken) -->
    <line x1="5" y1="20" x2="25" y2="-10" stroke="#c4b5fd" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Break indicator -->
    <circle r="4" fill="#dc2626" opacity="0.5"/>
  </g>
  <!-- Certificate outlines on sides -->
  <g opacity="0.4">
    <!-- Left certificate -->
    <rect x="140" y="200" width="120" height="160" rx="8" fill="none" stroke="#a78bfa" stroke-width="1"/>
    <line x1="160" y1="240" x2="240" y2="240" stroke="#a78bfa" stroke-width="0.8"/>
    <line x1="160" y1="260" x2="230" y2="260" stroke="#a78bfa" stroke-width="0.5"/>
    <line x1="160" y1="275" x2="220" y2="275" stroke="#a78bfa" stroke-width="0.5"/>
    <circle cx="200" cy="330" r="15" fill="none" stroke="#dc2626" stroke-width="0.8" stroke-dasharray="3,2"/>
    <!-- Right certificate -->
    <rect x="940" y="210" width="120" height="160" rx="8" fill="none" stroke="#a78bfa" stroke-width="1"/>
    <line x1="960" y1="250" x2="1040" y2="250" stroke="#a78bfa" stroke-width="0.8"/>
    <line x1="960" y1="270" x2="1030" y2="270" stroke="#a78bfa" stroke-width="0.5"/>
    <line x1="960" y1="285" x2="1020" y2="285" stroke="#a78bfa" stroke-width="0.5"/>
    <circle cx="1000" cy="340" r="15" fill="none" stroke="#dc2626" stroke-width="0.8" stroke-dasharray="3,2"/>
  </g>
  <!-- Additional X marks scattered -->
  <g stroke="#dc2626" stroke-width="1" opacity="0.4" stroke-linecap="round">
    <line x1="310" y1="140" x2="325" y2="155"/>
    <line x1="325" y1="140" x2="310" y2="155"/>
    <line x1="870" y1="460" x2="885" y2="475"/>
    <line x1="885" y1="460" x2="870" y2="475"/>
    <line x1="420" y1="500" x2="435" y2="515"/>
    <line x1="435" y1="500" x2="420" y2="515"/>
    <line x1="780" y1="130" x2="795" y2="145"/>
    <line x1="795" y1="130" x2="780" y2="145"/>
  </g>
  <!-- Accent particles -->
  <circle cx="100" cy="80" r="2" fill="#a78bfa" opacity="0.3"/>
  <circle cx="1100" cy="550" r="1.5" fill="#c4b5fd" opacity="0.25"/>
  <circle cx="350" cy="530" r="2" fill="#7c3aed" opacity="0.2"/>
  <circle cx="850" cy="80" r="1.5" fill="#dc2626" opacity="0.2"/>
  <!-- Dot pattern overlay -->
  <rect width="1200" height="630" fill="url(#dots-digsig)"/>
</svg>
