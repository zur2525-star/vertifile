<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg-blind" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#f5f3ff"/>
      <stop offset="50%" stop-color="#ede9fe"/>
      <stop offset="100%" stop-color="#ddd6fe"/>
    </linearGradient>
    <radialGradient id="glow-blind" cx="50%" cy="50%" r="35%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#4c1d95" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="data-stream" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0"/>
      <stop offset="50%" stop-color="#a78bfa" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </linearGradient>
    <pattern id="grid-blind" width="40" height="40" patternUnits="userSpaceOnUse">
      <line x1="40" y1="0" x2="40" y2="40" stroke="#8b5cf6" stroke-width="0.2" opacity="0.2"/>
      <line x1="0" y1="40" x2="40" y2="40" stroke="#8b5cf6" stroke-width="0.2" opacity="0.2"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg-blind)"/>
  <circle cx="600" cy="315" r="200" fill="url(#glow-blind)"/>
  <!-- Eye shape -->
  <g transform="translate(600,315)">
    <!-- Outer eye shape -->
    <ellipse rx="140" ry="70" fill="none" stroke="#7c3aed" stroke-width="1.5" opacity="0.6"/>
    <!-- Inner iris -->
    <circle r="45" fill="none" stroke="#7c3aed" stroke-width="1.2" opacity="0.5"/>
    <!-- Pupil -->
    <circle r="20" fill="#7c3aed" opacity="0.25"/>
    <circle r="8" fill="#a78bfa" opacity="0.4"/>
    <!-- Strike-through line (privacy) -->
    <line x1="-180" y1="-90" x2="180" y2="90" stroke="#7c3aed" stroke-width="2.5" opacity="0.7" stroke-linecap="round"/>
    <!-- Second strike line -->
    <line x1="-170" y1="-85" x2="170" y2="85" stroke="#8b5cf6" stroke-width="1" opacity="0.4" stroke-linecap="round"/>
  </g>
  <!-- Data streams (vertical flowing lines) -->
  <g opacity="0.4">
    <rect x="150" y="0" width="1.5" height="630" fill="url(#data-stream)"/>
    <rect x="250" y="50" width="1" height="530" fill="url(#data-stream)"/>
    <rect x="350" y="80" width="1.5" height="470" fill="url(#data-stream)"/>
    <rect x="450" y="30" width="1" height="570" fill="url(#data-stream)"/>
    <rect x="750" y="60" width="1.5" height="510" fill="url(#data-stream)"/>
    <rect x="850" y="20" width="1" height="590" fill="url(#data-stream)"/>
    <rect x="950" y="90" width="1.5" height="450" fill="url(#data-stream)"/>
    <rect x="1050" y="40" width="1" height="550" fill="url(#data-stream)"/>
  </g>
  <!-- Binary text along data streams -->
  <g font-family="monospace" font-size="10" fill="#7c3aed" opacity="0.25">
    <text x="145" y="160">01</text>
    <text x="145" y="280">10</text>
    <text x="145" y="400">01</text>
    <text x="245" y="200">11</text>
    <text x="245" y="350">00</text>
    <text x="345" y="180">10</text>
    <text x="345" y="420">01</text>
    <text x="745" y="190">01</text>
    <text x="745" y="380">11</text>
    <text x="945" y="230">10</text>
    <text x="945" y="410">00</text>
    <text x="1045" y="170">01</text>
    <text x="1045" y="450">10</text>
  </g>
  <!-- Lock symbols on sides -->
  <g transform="translate(200,315)" opacity="0.5">
    <rect x="-12" y="-5" width="24" height="18" rx="3" fill="none" stroke="#c4b5fd" stroke-width="1.2"/>
    <path d="M-6 -5 L-6 -12 A6 6 0 0 1 6 -12 L6 -5" fill="none" stroke="#c4b5fd" stroke-width="1.2"/>
  </g>
  <g transform="translate(1000,315)" opacity="0.5">
    <rect x="-12" y="-5" width="24" height="18" rx="3" fill="none" stroke="#c4b5fd" stroke-width="1.2"/>
    <path d="M-6 -5 L-6 -12 A6 6 0 0 1 6 -12 L6 -5" fill="none" stroke="#c4b5fd" stroke-width="1.2"/>
  </g>
  <!-- Accent dots -->
  <circle cx="100" cy="100" r="2" fill="#a78bfa" opacity="0.3"/>
  <circle cx="1100" cy="530" r="2" fill="#c4b5fd" opacity="0.25"/>
  <circle cx="80" cy="500" r="1.5" fill="#8b5cf6" opacity="0.2"/>
  <circle cx="1120" cy="100" r="1.5" fill="#a78bfa" opacity="0.2"/>
  <!-- Grid overlay -->
  <rect width="1200" height="630" fill="url(#grid-blind)"/>
</svg>
